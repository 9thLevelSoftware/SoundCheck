name: soundcheck_flutter
description: A Flutter app for discovering and reviewing concert venues and bands
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  
  # Navigation
  go_router: ^17.0.1
  
  # Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1
  
  # Data Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Secure Storage
  flutter_secure_storage: ^10.0.0
  
  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  cached_network_image: ^3.4.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1

  # Image Processing
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.3

  # Location Services
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Theme Persistence
  shared_preferences: ^2.5.4

  # Haptic Feedback
  vibration: ^3.1.5
  local_auth: ^3.0.0
  google_fonts: ^7.0.2

  # App Info
  package_info_plus: ^9.0.0

  # Sharing
  share_plus: ^12.0.1

  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.0

  # Social Sign-In
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # Crash Reporting
  sentry_flutter: ^9.9.2

  # Analytics
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.0
  percent_indicator: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.2.3
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.0
  
  # Testing
  mockito: ^5.4.6
  
  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
